<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind+ Daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- Google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


<style>
  *{
      font-family: "Geist", sans-serif;

  }
</style>

</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
    
    <div class="form ">
        <div class="card  bg-white max-w-md p-8 shadow-lg w-full rounded-lg ">
          <div class="logo  mx-auto pt-5">  
        <img src="./assets/github-logo.png" alt="">
    </div>
           <div class="text-center space-y-1 mt-[10px]">
          <h2 class="font-semibold ">GitHub Issues Tracker</h2>
          <p class="text-[#64748B] text-[16px]">Sign in to manage your issues</p>
        </div>
      <div class="card-body ">
        <fieldset class="fieldset ">
          <label class="label text-neutral font-bold">Username</label>
          <input id="input-name" class="input  bg-base-200" placeholder="Enter Username" />
            <p class="text-blue-400 mb-[10px]">Username: admin</p>
          <label class="label text-neutral font-bold">Password</label>
          <input id="input-password" type="password" class="input rounded-sm bg-base-200"  placeholder="Enter Password" />
          <span class="text-blue-400 mb-[10px]">Password: admin123</span>
          <button id="login-btn" class="btn btn-soft btn-primary mt-4">Login</button>
        </fieldset>
            <!-- <div class="flex items-center my-4">
              <hr class="flex-grow border-t border-gray-300">
              <span class="px-3 text-gray-300 text-sm font-medium">OR</span>
              <hr class="flex-grow border-t border-gray-300">
            </div>
            <p class="text-center mt-3">Demo Credentials:</p>
           <div class=" text-center">
                <span>Username: admin</span>
                <p>Password: admin123</p>
           </div> -->
      </div>
    </div>
    </div>
      
    <script src="./tracker.js"></script>
</body>
</html>
