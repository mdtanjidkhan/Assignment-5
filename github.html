<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

     <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind+ Daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- Google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<!-- font awesome icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
  *{
      font-family: "Geist", sans-serif;

  }
</style>

</head>
<body class="bg-gray-100 min-h-screen ">
       
     <div class="navbar grid-flow-col md:bg-base-100 shadow-sm flex justify-between p-5">
  <div class="flex gap-2 justify-center items-center">
    <img src="./assets/github-logo.png" class="mx-auto w-8" alt="">
       <p class="text-[14px] font-medium md:font-semibold text-lg">GitHub Issues Tracker</p>
  </div>
  <div class="flex gap-2 justify-center items-center">
     <label class="input input-border flex items-center gap-2">
 
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4  opacity-70">
      <path fill-rule="evenodd" d="M9.965 11.026a5 5 0 1 1 1.06-1.06l2.755 2.754a.75.75 0 1 1-1.06 1.06l-2.755-2.754ZM10.5 7a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0Z" clip-rule="evenodd" />
    </svg>
    <input id="input-search" type="text" class="grow" placeholder="Search Issues" />
   
</label>
      <div>
        <button id="search-btn" class="btn btn-soft btn-success">Search</button>
      </div>
    </div>
  </div>
</div>
 <section class="bg-white w-11/12 mx-auto py-5 mt-[60px] pl-5 rounded-md shadow-lg">
      <div class="flex gap-3">
        <button id="tab-all" onclick="switchTab('all')" class=" px-5 py-1.5 border-2 font-medium cursor-pointer transition-all duration-200 rounded-md ">All</button>
<button id="tab-open" onclick="switchTab('open')" class="px-5 py-1.5 border-2 font-medium cursor-pointer transition-all duration-200 rounded-md">Open</button>
<button id="tab-closed" onclick="switchTab('closed')" class=" px-5 py-1.5 border-2 font-medium cursor-pointer transition-all duration-200 rounded-md">Closed</button>
      </div>
 </section>

   <section class="bg-white w-11/12 mx-auto py-7 mt-3 p-3 rounded-md shadow-lg">
           <div class="flex justify-between">
                <div class="left  flex justify-center items-center gap-2">
                   <div class="">
                    <img src="./assets/Aperture.png" class="main" alt=""> 
                   </div>
                       <div class="flex gap-3">
                         <h2 id="count" class="text-[#1F2937] font-extrabold"> 0 </h2>
                         <span class="font-bold text-black">Issue</span>
                       </div> 
                  
                </div>
                
                <div class="flex justify-center items-center gap-3">
                  <div>
                     <span class=""></span>
                     <span>Open</span>
                  </div>
                  <div>
                    <span class=""></span>
                     <span>Closed</span>
                  </div>
                </div>
           </div>
            <p class=" text-blue-400  md:text-[#64748B] pl-8">Track and manage your project issues</p>
          
   </section>
         <section class=" bg-white w-11/12 mx-auto rounded-b-md mt-3">
           <div id="main-container" class="grid grid-cols-1 mx-auto md:grid-cols-4 gap-2 p-5 pt-2">
               
             

           </div>
         </section>
         <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="my_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
   <div id="details-container">
        
          
   </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-soft btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>


 <script src="./git.js"></script>
</body>
</html>
